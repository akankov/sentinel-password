# Dependabot configuration for sentinel-password monorepo
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Root workspace dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    ignore:
      # eslint-plugin-react 7.37.5 is incompatible with ESLint 10
      # (calls context.getFilename() which ESLint 10 removed).
      # Pin examples on eslint 9 until the plugin ships a v10-compatible release.
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      development-dependencies:
        dependency-type: 'development'
        patterns:
          - '*'
        exclude-patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
    commit-message:
      prefix: 'chore'
      include: 'scope'

  # Core package dependencies
  - package-ecosystem: 'npm'
    directory: '/packages/core'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore'
      include: 'scope'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore'
      include: 'scope'
