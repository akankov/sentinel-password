<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Shield body -->
  <path
    d="M100 10 L185 50 C185 50 185 140 100 210 C15 140 15 50 15 50 Z"
    fill="url(#shieldGrad)"
    stroke="url(#strokeGrad)"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Inner shield highlight -->
  <path
    d="M100 28 L170 60 C170 60 170 132 100 192 C30 132 30 60 30 60 Z"
    fill="url(#innerGrad)"
    opacity="0.3"
  />

  <!-- Lock body -->
  <rect x="72" y="105" width="56" height="44" rx="6" fill="#fff" opacity="0.95"/>

  <!-- Lock shackle -->
  <path
    d="M78 105 V88 C78 72 88 62 100 62 C112 62 122 72 122 88 V105"
    stroke="#fff"
    stroke-width="8"
    stroke-linecap="round"
    fill="none"
    opacity="0.95"
  />

  <!-- Keyhole -->
  <circle cx="100" cy="122" r="7" fill="url(#shieldGrad)"/>
  <rect x="97" y="126" width="6" height="12" rx="2" fill="url(#shieldGrad)"/>

  <!-- Checkmark -->
  <path
    d="M82 78 L94 90 L118 66"
    stroke="#5ceaad"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <defs>
    <linearGradient id="shieldGrad" x1="100" y1="10" x2="100" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4fc3b1"/>
      <stop offset="100%" stop-color="#2a7d6e"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="100" y1="10" x2="100" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5ceaad"/>
      <stop offset="100%" stop-color="#1f5f53"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="100" y1="28" x2="100" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#4fc3b1"/>
    </linearGradient>
  </defs>
</svg>
